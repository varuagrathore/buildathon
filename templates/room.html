<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room {{ code }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="room-wrap">
    <div class="room-shell">
      <div class="room-header">
        <div class="freq-block">
          <span class="status-pill live"><span class="status-dot"></span>Huddle live</span>
          <span class="freq-lcd">{{ code }}</span>
        </div>
        <div class="header-right">
          <a href="{{ url_for('home') }}" class="btn danger-outline">Leave</a>
        </div>
      </div>

      <div class="presence-bar" id="presenceBar">
        <span class="presence-count" id="presenceCount">· connecting…</span>
        <div class="presence-avatars" id="presenceAvatars"></div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-hint" id="emptyHint">
          <div class="empty-hint-icon">💬</div>
          <p>Nobody's spilled anything yet.</p>
          <p class="empty-hint-sub">Be the one who breaks the silence.</p>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="picker-panel" id="emojiPanel" hidden>
        <div class="picker-grid" id="emojiGrid"></div>
      </div>
      <div class="picker-panel" id="gifPanel" hidden>
        <input type="text" id="gifSearchInput" placeholder="Search GIFs…" autocomplete="off">
        <div class="gif-grid" id="gifGrid"></div>
      </div>

      <div class="composer">
        <button id="emoji-btn" class="btn secondary icon-btn" type="button" title="Emoji">&#128512;</button>
        <button id="gif-btn" class="btn secondary icon-btn" type="button" title="GIF">GIF</button>
        <input type="text" id="message" placeholder="Spill something… we'll guess the vibe" autocomplete="off">
        <button id="send-btn" class="btn primary">Send <span aria-hidden="true">&#8594;</span></button>
      </div>
    </div>
  </div>

<script type="text/javascript">
  const CURRENT_NAME = {{ name|tojson }};
  const EMOJI_LIST = [
    "😀","😁","😂","🤣","😊","😍","🥰","😘","😜","🤪","😎","🥳","😇","🙂","🙃","😉",
    "😢","😭","😡","🤬","😱","😨","😰","😥","😓","🤯","🥵","🥶","😴","🤤","🤒","🤕",
    "🤔","🤨","😐","😏","😬","🙄","😴","🤢","🤮","🤧","😷","🥴","😵","🤠","🥸","🧐",
    "👍","👎","👏","🙌","🙏","💪","👀","👋","🤝","✌️","🤞","🤙","👌","🖕","💯","🔥",
    "❤️","🧡","💛","💚","💙","💜","🖤","🤍","💔","💕","💞","💓","💗","💖","😻","💋",
    "🎉","🎊","🎂","🍾","🥂","☕","🍕","🍔","🍟","🍩","🍺","🍷","🍫","🍎","🍿","🧋",
    "🐶","🐱","🐭","🐹","🐻","🐼","🐨","🐸","🙈","🙉","🙊","🦄","🐷","🐔","🦋","🐢",
    "⚽","🏀","🎮","🎧","🎸","🎨","📚","💻","📱","⏰","💰","🚀","✈️","🚗","🏠","🎯",
    "💀","👻","👽","🤖","😈","👹","🧠","👑","💎","🔔","⭐","🌈","☀️","🌙","⚡","💤"
  ];
  var socketio = io();

  const messages = document.getElementById("messages");
  const typingIndicator = document.getElementById("typingIndicator");
  const presenceCount = document.getElementById("presenceCount");
  const presenceAvatars = document.getElementById("presenceAvatars");

  function nameColor(name){
    let hash = 0;
    for (let i = 0; i < name.length; i++){ hash = name.charCodeAt(i) + ((hash << 5) - hash); }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 60%, 62%)`;
  }

  function renderReactionChips(wrap, reactions){
    wrap.querySelectorAll(".reaction-btn").forEach(el => el.remove());
    const addBtn = wrap.querySelector(".reaction-add-btn");
    Object.entries(reactions || {}).forEach(([emoji, count]) => {
      if (!count) return;
      const btn = document.createElement("button");
      btn.className = "reaction-btn active";
      btn.dataset.emoji = emoji;
      btn.type = "button";
      btn.textContent = emoji;
      const countEl = document.createElement("span");
      countEl.className = "count";
      countEl.textContent = count;
      btn.appendChild(countEl);
      wrap.insertBefore(btn, addBtn);
    });
  }

  function buildReactionsBar(id, reactions){
    const wrap = document.createElement("div");
    wrap.className = "reactions";
    wrap.dataset.id = id;
    const addBtn = document.createElement("button");
    addBtn.className = "reaction-add-btn";
    addBtn.type = "button";
    addBtn.textContent = "+";
    addBtn.title = "Add reaction";
    wrap.appendChild(addBtn);
    renderReactionChips(wrap, reactions);
    addBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openEmojiPanel({ type: "react", id });
    });
    return wrap;
  }

  const createMessage = (data) => {
    const el = document.createElement("div");
    const isSystem = data.message === "has entered the room" || data.message === "has left the room";

    if (isSystem) {
      el.className = "message system";
      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = `${data.name} ${data.message}`;
      el.appendChild(bubble);
    } else {
      const emptyHint = document.getElementById("emptyHint");
      if (emptyHint) emptyHint.style.display = "none";

      const who = data.name === CURRENT_NAME ? "own" : "other";
      el.className = `message ${who} enter`;

      const meta = document.createElement("span");
      meta.className = "msg-meta";
      meta.textContent = data.name;
      if (who === "other") meta.style.color = nameColor(data.name);
      el.appendChild(meta);

      if (data.type === "gif") {
        const img = document.createElement("img");
        img.className = "gif-bubble";
        img.src = data.message;
        img.loading = "lazy";
        el.appendChild(img);
      } else {
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.appendChild(document.createTextNode(data.message + " "));
        if (data.emoji) {
          const emojiSpan = document.createElement("span");
          emojiSpan.className = "auto-emoji";
          emojiSpan.title = "Detected vibe";
          emojiSpan.textContent = data.emoji;
          bubble.appendChild(emojiSpan);
        }
        el.appendChild(bubble);
      }

      if (data.id) {
        el.appendChild(buildReactionsBar(data.id, data.reactions));
      }
    }
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    requestAnimationFrame(() => el.classList.remove("enter"));
  };

  socketio.on("message", (data) => {
    createMessage(data);
    delete typingUsers[data.name];
    renderTypingIndicator();
  });

  socketio.on("reaction_update", (data) => {
    const wrap = messages.querySelector(`.reactions[data-id="${data.message_id}"]`);
    if (!wrap) return;
    renderReactionChips(wrap, data.reactions);
    const newest = wrap.querySelector(".reaction-btn:last-of-type");
    if (newest) {
      newest.classList.remove("bump");
      void newest.offsetWidth;
      newest.classList.add("bump");
    }
  });

  socketio.on("presence_update", (data) => {
    const others = data.names.filter(n => n !== CURRENT_NAME);
    presenceCount.textContent = `· ${data.count} in the room`;
    presenceAvatars.innerHTML = "";
    data.names.slice(0, 6).forEach(n => {
      const av = document.createElement("span");
      av.className = "avatar";
      av.textContent = n.charAt(0).toUpperCase();
      av.style.background = nameColor(n) + "33";
      av.style.borderColor = nameColor(n);
      av.style.color = nameColor(n);
      av.title = n;
      presenceAvatars.appendChild(av);
    });
  });

  let typingUsers = {};
  function renderTypingIndicator(){
    const names = Object.keys(typingUsers);
    if (!names.length){ typingIndicator.textContent = ""; return; }
    typingIndicator.textContent = names.length === 1
      ? `${names[0]} is typing…`
      : `${names.join(", ")} are typing…`;
  }
  socketio.on("typing", (data) => {
    if (data.name === CURRENT_NAME) return;
    clearTimeout(typingUsers[data.name]);
    typingUsers[data.name] = setTimeout(() => {
      delete typingUsers[data.name];
      renderTypingIndicator();
    }, 2000);
    renderTypingIndicator();
  });

  messages.addEventListener("click", (e) => {
    const btn = e.target.closest(".reaction-btn");
    if (!btn) return;
    const wrap = btn.closest(".reactions");
    socketio.emit("react", { message_id: wrap.dataset.id, emoji: btn.dataset.emoji });
  });

  const messageInput = document.getElementById("message");

  const sendMessage = () => {
    const msg = messageInput.value.trim();
    if (!msg) return;
    socketio.emit("message", { data: msg, type: "text" });
    messageInput.value = "";
  };

  document.getElementById("send-btn").addEventListener("click", sendMessage);
  messageInput.addEventListener("keyup", (e) => {
    if (e.key === "Enter") { sendMessage(); return; }
    socketio.emit("typing");
  });

  /* ---------- emoji picker ---------- */
  const emojiPanel = document.getElementById("emojiPanel");
  const emojiGrid = document.getElementById("emojiGrid");
  const emojiBtn = document.getElementById("emoji-btn");
  let pickerTarget = null;

  EMOJI_LIST.forEach(emoji => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "emoji-opt";
    btn.textContent = emoji;
    btn.addEventListener("click", () => {
      if (!pickerTarget) return;
      if (pickerTarget.type === "react") {
        socketio.emit("react", { message_id: pickerTarget.id, emoji });
      } else {
        insertAtCursor(messageInput, emoji);
      }
      closePanels();
    });
    emojiGrid.appendChild(btn);
  });

  function insertAtCursor(input, text){
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? input.value.length;
    input.value = input.value.slice(0, start) + text + input.value.slice(end);
    const pos = start + text.length;
    input.focus();
    input.setSelectionRange(pos, pos);
  }

  function openEmojiPanel(target){
    pickerTarget = target;
    gifPanel.hidden = true;
    emojiPanel.hidden = false;
  }

  function closePanels(){
    emojiPanel.hidden = true;
    gifPanel.hidden = true;
    pickerTarget = null;
  }

  emojiBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!emojiPanel.hidden && pickerTarget && pickerTarget.type === "compose") { closePanels(); return; }
    openEmojiPanel({ type: "compose" });
  });

  document.addEventListener("click", (e) => {
    if (!emojiPanel.hidden && !emojiPanel.contains(e.target) && e.target !== emojiBtn && !e.target.closest(".reaction-add-btn")) {
      emojiPanel.hidden = true;
    }
    if (!gifPanel.hidden && !gifPanel.contains(e.target) && e.target !== gifBtn) {
      gifPanel.hidden = true;
    }
  });

  /* ---------- gif search ---------- */
  const gifPanel = document.getElementById("gifPanel");
  const gifGrid = document.getElementById("gifGrid");
  const gifBtn = document.getElementById("gif-btn");
  const gifSearchInput = document.getElementById("gifSearchInput");
  let gifDebounce;

  async function searchGifs(query){
    gifGrid.innerHTML = '<div class="gif-status">Searching…</div>';
    try {
      const res = await fetch(`/gif-search?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      gifGrid.innerHTML = "";
      if (!data.results || !data.results.length) {
        gifGrid.innerHTML = `<div class="gif-status">${data.error || "No results"}</div>`;
        return;
      }
      data.results.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.loading = "lazy";
        img.addEventListener("click", () => {
          socketio.emit("message", { data: url, type: "gif" });
          closePanels();
        });
        gifGrid.appendChild(img);
      });
    } catch (err) {
      gifGrid.innerHTML = '<div class="gif-status">Search failed</div>';
    }
  }

  gifBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!gifPanel.hidden) { closePanels(); return; }
    emojiPanel.hidden = true;
    gifPanel.hidden = false;
    gifSearchInput.value = "";
    gifSearchInput.focus();
    searchGifs("");
  });

  gifSearchInput.addEventListener("input", () => {
    clearTimeout(gifDebounce);
    gifDebounce = setTimeout(() => searchGifs(gifSearchInput.value.trim()), 350);
  });

  messages.scrollTop = messages.scrollHeight;
</script>
</body>
</html>
